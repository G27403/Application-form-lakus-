  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professional Application Form</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="form-box">

      <div class="top">
        <h1>Website Application Form</h1>
        <p>Please fill all required information correctly.</p>
      </div>

      <form id="applicationForm">

        <div class="grid">

          <div class="input-group">
            <label>First Name</label>
            <input type="text" id="firstname" placeholder="Enter first name" required>
          </div>

          <div class="input-group">
            <label>Surname</label>
            <input type="text" id="surname" placeholder="Enter surname" required>
          </div>

          <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+220 XXX XXXX" required>
          </div>

          <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
          </div>

          <div class="input-group">
            <label>Gender</label>
            <select id="gender" required>
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>

          <div class="input-group">
            <label>Nationality</label>
            <input type="text" id="nationality" placeholder="Nationality">
          </div>

          <div class="input-group">
            <label>Address</label>
            <input type="text" id="address" placeholder="Enter address">
          </div>

        </div>

        <div class="input-group">
          <label>Why are you applying?</label>
          <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
        </div>

        <div class="input-group checkbox">
          <input type="checkbox" id="agree" required>
          <span>I confirm that all information is correct.</span>
        </div>

        <button type="submit" class="btn">
          Submit Application
        </button>

        <div id="successMessage"></div>

      </form>https://formspree.io/f/mojboyon
    <script  src="./script.js"></script>

  </body>
  
</html>
